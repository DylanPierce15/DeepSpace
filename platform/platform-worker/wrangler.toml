# DeepSpace Platform Worker
# Hosts global DOs: conv:{id}, dir:{id}, workspace:default

name = "deepspace-platform-worker"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GlobalRecordRoom"]

[[r2_buckets]]
binding = "SCHEMA_REGISTRY"
bucket_name = "deepspace-schema-registry"

[durable_objects]
bindings = [
  { name = "RECORD_ROOMS", class_name = "GlobalRecordRoom" },
]

[dev]
port = 8792
inspector_port = 9233
