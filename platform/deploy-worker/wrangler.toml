# DeepSpace Deploy Worker
# Handles app deployment to Workers for Platforms on behalf of authenticated users.
# Holds CLOUDFLARE_API_TOKEN — isolated from other workers for security.

name = "deepspace-deploy"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "APP_REGISTRY"
bucket_name = "deepspace-schema-registry"

# Shared with dispatch-worker — stores per-app cron task configs
[[kv_namespaces]]
binding = "CRON_TASKS"
id = "a13702840633449ab9a5e5371491ac18"

# Service binding to the auth worker. Required for minting APP_OWNER_JWT
# at deploy time — Cloudflare blocks Worker→Worker subrequests via the
# public *.workers.dev URL (CF error 1042), so we must call the auth
# worker via a service binding.
[[services]]
binding = "AUTH_WORKER"
service = "deepspace-auth"

[dev]
port = 8796
inspector_port = 9237

# Secrets (set via `wrangler secret put`):
#   AUTH_JWT_PUBLIC_KEY       — ES256 public key for JWT verification
#   AUTH_JWT_ISSUER           — JWT issuer URL
#   CLOUDFLARE_API_TOKEN      — CF API token for WfP operations
#   CLOUDFLARE_ACCOUNT_ID     — CF account ID
#   DEPLOY_JWT_PUBLIC_KEY_PEM — The actual PEM value to set on deployed workers
#   INTERNAL_HMAC_SECRET      — HMAC secret to set on deployed workers
