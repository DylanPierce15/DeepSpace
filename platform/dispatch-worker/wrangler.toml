# DeepSpace Dispatch Worker
# Routes *.app.space requests to per-app user workers via Workers for Platforms

name = "deepspace-dispatch"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Workers for Platforms dispatch namespace
[[dispatch_namespaces]]
binding = "USER_APPS"
namespace = "spaces-apps"

[[kv_namespaces]]
binding = "HOSTNAME_MAP"
id = "5c57d809011d4574b8fa4f4e7b03ef9a"

[[kv_namespaces]]
binding = "CRON_TASKS"
id = "a13702840633449ab9a5e5371491ac18"

[dev]
port = 8793
inspector_port = 9234

[triggers]
crons = ["* * * * *"]
