    output:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            orderbook:
              type: object
              properties:
                market:
                  type: string
                asset_id:
                  type: string
                hash:
                  type: string
                timestamp:
                  type: string
                bids:
                  type: array
                  items:
                    type: object
                    properties:
                      price:
                        type: string
                      size:
                        type: string
                    required:
                      - price
                      - size
                    additionalProperties: false
