                  color:
                    type: string
                    pattern: "^#[0-9A-Fa-f]{6}$"
                  weight:
                    type: number
                    minimum: 0.05
                    maximum: 1
                required:
                  - color
                  - weight
                additionalProperties: false
              minItems: 1
              maxItems: 5
            effects:
              type: object
              properties:
                color:
                  type: string
                  enum:
                    - b&w
                    - pastel
                    - sepia
                    - dramatic
                    - vibrant
                    - orange&teal
                    - film-filter
                    - split
                    - electric
                    - pastel-pink
                    - gold-glow
                    - autumn
                    - muted-green
                    - deep-teal
                    - duotone
                    - terracotta&teal
                    - red&blue
                    - cold-neon
                    - burgundy&blue
                lightning:
                  type: string
                  enum:
                    - studio
                    - warm
                    - cinematic
                    - volumetric
                    - golden-hour
                    - long-exposure
                    - cold
                    - iridescent
                    - dramatic
                    - hardlight
                    - redscale
                    - indoor-light
                framing:
                  type: string
                  enum:
                    - portrait
                    - macro
                    - panoramic
                    - aerial-view
                    - close-up
                    - cinematic
                    - high-angle
                    - low-angle
                    - symmetry
                    - fish-eye
                    - first-person
              additionalProperties: false
          additionalProperties: false
        guidance_scale:
          type: number
          minimum: 0
          maximum: 2
        image:
          type: object
          properties:
            size:
              type: string
              enum:
                - square_1_1
                - classic_4_3
                - traditional_3_4
                - widescreen_16_9
                - social_story_9_16
                - smartphone_horizontal_20_9
                - smartphone_vertical_9_20
                - standard_3_2
                - portrait_2_3
