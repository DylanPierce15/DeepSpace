  generate_image_classic:
    method: POST
    endpoint: /generate-image-classic
    description: "Generate image from text with full parameter control (classic fast model)"
    input_schema:
      type: object
      properties:
        prompt:
          type: string
          minLength: 3
        negative_prompt:
          type: string
          minLength: 3
        styling:
          type: object
          properties:
            style:
              type: string
