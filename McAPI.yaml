                  type: string
                to:
                  type: string
              additionalProperties: false
            safe:
              type: boolean
          additionalProperties: false
        schemaId:
          type: string
          minLength: 1
        schema: {}
        parseResultsPrompt:
          type: string
      required:
        - searchPrompt
    output:
      type: object
      properties:
