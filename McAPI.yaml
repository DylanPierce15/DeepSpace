                properties:
                  type:
                    type: string
                  url:
                    type: string
                  title:
                    type: string
                  width:
                    type: number
                  height:
                    type: number
                additionalProperties: true
            images:
              type: array
            summary:
              type: string
            debug:
              type: object
              additionalProperties: {}
          additionalProperties: false
        error:
          type: string
      required:
        - success

  search_videos:
    method: POST
