name: miyagi-integrations
version: "auto"
description: "Auto-generated from route-owned Zod schemas"
base_url: http://localhost:3001/api/integrations

# USAGE: Call integrations using the `endpoint` field with miyagiAPI:
#   miyagiAPI.post('/generate-text', { prompt: '...' })
#   miyagiAPI.get('/status')
# Always use the exact endpoint (with leading /) as shown in each tool definition.

auth:
  type: user_session
  description: "All tools require authenticated user session via JWT token"

defaults:
  headers:
    Accept: application/json
    Content-Type: application/json
    Authorization: "Bearer {user_jwt_token}"

tools:

  generate_text:
    method: POST
    endpoint: /generate-text
    description: "Generate text with LLM"
    input_schema:
      type: object
      properties:
        prompt:
          type: string
          minLength: 1
        provider:
          type: string
          enum:
            - openai
            - anthropic
          default: openai
        model:
          type: string
          enum:
            - gpt-4o
            - gpt-4o-mini
            - gpt-5-nano
            - gpt-5-mini
            - gpt-5
            - claude-3-5-haiku-20241022
            - claude-sonnet-4-20250514
          default: "gpt-4o-mini"
        max_tokens:
          type: integer
          exclusiveMinimum: 0
          maximum: 200000
          default: 8192
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 1
        system_prompt:
          type: string
      required:
        - prompt
    output:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            text:
              type: string
            provider:
              type: string
            model:
              type: string
          additionalProperties: false
        error:
          type: string
      required:
        - success

  google_calendar_events:
    method: GET
    endpoint: /google-calendar-events
    description: "List Google Calendar events within a time range"
    output:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            requiresOAuth:
              type: boolean
            authUrl:
              type: string
            events:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  summary:
                    type: string
                  description:
                    type: string
                  start:
                    type: object
                    properties: {}
                    additionalProperties: true
                  end:
                    type: object
                    properties: {}
                    additionalProperties: true
                  htmlLink:
                    type: string
                required:
                  - id
                additionalProperties: false
          additionalProperties: false
        error:
          type: string
      required:
        - success

  google_calendar_create_events:
    method: POST
    endpoint: /google-calendar-create-events
    description: "Create events on the user's Google Calendar"
    input_schema:
      type: object
      properties:
        events:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                minLength: 1
              description:
                type: string
              start:
                type: string
                minLength: 1
              end:
                anyOf:
                  - 
                    type: string
                    minLength: 1
                  - 
                    type: null
              allDay:
                type: boolean
                default: false
              groupId:
                type: string
            required:
              - title
              - start
              - end
            additionalProperties: false
          minItems: 1
      required:
        - events
    output:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            requiresOAuth:
              type: boolean
            authUrl:
              type: string
            created:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  htmlLink:
                    type: string
                  summary:
                    type: string
                  start:
                    type: string
                  end:
                    type: string
                required:
                  - id
                additionalProperties: false
          additionalProperties: false
        error:
          type: string
      required:
        - success

  search_web:
    method: POST
    endpoint: /search-web
    description: "Search web pages and get AI-summarized content with citations"
    input_schema:
      type: object
      properties:
        searchPrompt:
          type: string
          minLength: 1
        queryHints:
          type: array
          items:
            type: string
            minLength: 1
          default: []
        count:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
        parseResultsPrompt:
          type: string
        constraints:
          type: object
          properties:
            allowDomains:
              type: array
              items:
                type: string
                minLength: 1
            denyDomains:
              type: array
              items:
                type: string
                minLength: 1
            dateRange:
              type: object
              properties:
                from:
                  type: string
                to:
                  type: string
              additionalProperties: false
            safe:
              type: boolean
          additionalProperties: false
      required:
        - searchPrompt
    output:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        error:
          type: string
      required:
        - success
    output_description: "data contains: { summary, citations[], sources[] }"

  search_web_raw:
    method: POST
    endpoint: /search-web-raw
    description: "Search web pages and return raw results without AI summarization (includes extracted text)"
    input_schema:
      type: object
      properties:
        searchPrompt:
          type: string
          minLength: 1
        queryHints:
          type: array
          items:
            type: string
            minLength: 1
          default: []
        count:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
        constraints:
          type: object
          properties:
            allowDomains:
              type: array
              items:
                type: string
                minLength: 1
            denyDomains:
              type: array
              items:
                type: string
                minLength: 1
            dateRange:
              type: object
              properties:
                from:
                  type: string
                to:
                  type: string
              additionalProperties: false
            safe:
              type: boolean
          additionalProperties: false
      required:
        - searchPrompt
    output:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        error:
          type: string
      required:
        - success
    output_description: "data contains: { sources[{ url, title, snippet, extractedText }], query }"

  search_web_ai:
    method: POST
    endpoint: /search-web-ai
    description: "Search web pages and process results with ChatGPT using custom prompt"
    input_schema:
      type: object
      properties:
        searchPrompt:
          type: string
          minLength: 1
        queryHints:
          type: array
          items:
            type: string
            minLength: 1
          default: []
        count:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
        constraints:
          type: object
          properties:
            allowDomains:
              type: array
              items:
                type: string
                minLength: 1
            denyDomains:
              type: array
              items:
                type: string
                minLength: 1
            dateRange:
              type: object
              properties:
                from:
                  type: string
                to:
                  type: string
              additionalProperties: false
            safe:
              type: boolean
          additionalProperties: false
        aiPrompt:
          type: string
          minLength: 1
        provider:
          type: string
          enum:
            - openai
            - anthropic
          default: openai
        model:
          type: string
        max_tokens:
          type: integer
          exclusiveMinimum: 0
          maximum: 200000
          default: 16000
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 0.7
      required:
        - searchPrompt
        - aiPrompt
    output:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            aiResponse:
              type: string
            sources:
              type: array
              items:
                type: object
                properties:
                  url:
                    type: string
                  title:
                    type: string
                  snippet:
                    type: string
                  extractedText:
                    type: string
                required:
                  - url
                additionalProperties: false
            query:
              type: string
          additionalProperties: false
        error:
          type: string
      required:
        - success

  search_images:
    method: POST
